databaseChangeLog:
  - changeSet:
      id: 003-create-books
      author: Elvira

      changes:
        - createTable:
            tableName: books
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: isbn
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: is_available
                  type: BOOLEAN
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: genre
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: published_year
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: member_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: books
            baseColumnNames: author_id
            referencedTableName: authors
            referencedColumnNames: id
            constraintName: fk_books_author

        - addForeignKeyConstraint:
            baseTableName: books
            baseColumnNames: member_id
            referencedTableName: members
            referencedColumnNames: id
            constraintName: fk_books_member
