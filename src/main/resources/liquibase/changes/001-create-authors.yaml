databaseChangeLog:
  - changeSet:
      id: 001-create-authors
      author: Elvira

      changes:
        - createTable:
            tableName: authors
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
